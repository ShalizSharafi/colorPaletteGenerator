<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Colors</title>
       <link rel="stylesheet" href="stylesheet/out.css">
</head>
<body>
       <!-- header ///////////////////////////////////// -->
       <header class="row px-5 ">
              <div class="w-full flex py-2.5   items-center border-b border-gray-500/25">
                   <figure class="flex w-1/2 lg:w-2/12">
                     <img src="images/logo.svg" alt="" class="w-1/2 sm:w-1/3 md:w-1/3 lg:w-full xl:w-2/3 object-cover">
                   </figure>
                   <div class="hidden lg:flex lg:w-8/12 lg:items-center lg:justify-end">
                     <a href="" class="link">
                            <span>Tools</span>
                     </a>
                     <a href="" class="link hover:bg-pink-400/20">
                            <span class=" text-pink-400">go pro</span>
                     </a>
                   </div>
                   <div class="hidden lg:flex lg:w-2/12 lg:items-center lg:justify-end gap-1">
                     <a href="" class="link">
                            <span>sign in</span>
                     </a>
                     <a href="" class="link bg-blue">
                            <span class="text-white">sign up</span>
                     </a>
                   </div>
                   <div class="flex w-1/2 lg:hidden justify-end">
                     <span class="w-10 h-10 flex items-center justify-center ">
                            <img src="images/menu-line.png" alt="" class="w-2/3 h-2/3 object-cover">
                     </span>
                   </div>
              </div>
              <div class="w-full hidden xl:flex py-2.5  *:flex items-center *:justify-end border-b border-gray-500/25">
                     <div class=" w-4/12">
                            <p class="w-full flex text-start text-md text-black/75">Press the spacebar to generate color palettes!</p>
                     </div>
                     <div class=" w-1/12">
                             <span class="headerIcon">
                            <img src="images/more-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span> 
                      <span class="headerIcon">
                            <img src="images/tools-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span> 
                     </div>
                     <div class=" w-2/12">
                            <span class="headerIcon">
                            <img src="images/camera-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     <span class="headerIcon">
                            <img src="images/grid-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     <span class="headerIcon">
                            <img src="images/shapes-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     <span class="headerIcon">
                            <img src="images/glasses-2-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     <span class="headerIcon">
                            <img src="images/contrast-fill.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     <span class="headerIcon">
                            <img src="images/settings-5-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     </div>
                     <div class=" w-1/12  *:hover:bg-gray-500/25 *:duration-500">
                           <span class="headerIcon">
                            <img src="images/arrow-left-s-fill.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                      <span class="headerIcon">
                            <img src="images/arrow-right-s-fill.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>  
                     </div>
                     <nav class=" w-3/12 gap-1">
                             <a href="" class="link">
                            <span>view</span>
                            <span class="headerIcon">
                            <img src="images/eye-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     </a>
                      <a href="" class="link">
                            <span>export</span>
                            <span class="headerIcon">
                            <img src="images/export-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     </a>
                      <a href="" class="link hover:bg-blue/25">
                            <span class="text-blue">save</span>
                            <span class="headerIcon">
                            <img src="images/save-line.png" alt="" class="w-1/2 h-1/2 object-cover">
                     </span>
                     </a>
                     </nav>
                     <div class=" w-1/12">
                            <span class="w-10 h-10 flex items-center justify-center hover:bg-gray-500/25 rounded-[5px] duration-500">
                            <img src="images/menu-line.png" alt="" class="w-2/3 h-2/3 object-cover">
                     </span>
                     </div>
              </div>
       </header>
       <!-- section-1 ///////////////////////////////////////////////////////////// -->
       <section class="w-full">
              <div class="colorBox w-full flex flex-wrap md:h-[80vh] ">
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
                     <span class="spanSpread group">
                            <b class="colorCode group-hover:flex"></b>
                     </span>
              </div>
       </section>
</body>
<script src="js/master.js">

</script>
</html>
